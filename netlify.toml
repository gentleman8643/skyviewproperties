[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/media-manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/properties/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
