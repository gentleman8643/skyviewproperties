<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyview Properties | Nationwide Portfolios</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <main id="catalog-section" class="py-12 max-w-7xl mx-auto px-4">
        <div id="master-catalog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Data will load here -->
        </div>
    </main>

    <script>
        async function buildAssetDatabase() {
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5Dudb7PfN8IwcrGz8GuKIpPtWymiJNG4bmoCcLiq-z_x2hDmuF3psbI6rDAhMpe0RCopMfdHUuyb1/pub?output=csv';
            
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                // Split by line and filter out empty rows
                const rows = data.split('\n').filter(row => row.trim() !== '').slice(1);
                
                const grid = document.getElementById('master-catalog-grid');
                grid.innerHTML = rows.map(row => {
                    const cols = row.split(',');
                    // Mapping indices: 0:ID, 1:Status, 2:Tier, 3:PriceRaw, 4:PriceDisplay, 5:Beds, 6:Baths, 7:SqFt, 8:Address, 9:Description
                    return `
                    <div class="bg-white rounded-2xl overflow-hidden shadow border border-gray-200">
                        <div class="p-6">
                            <span class="bg-indigo-600 text-white text-[10px] font-bold px-2 py-1 rounded-full uppercase">${cols[2] || 'Property'}</span>
                            <div class="text-indigo-600 font-extrabold text-2xl mt-2">${cols[4] || '$0'}</div>
                            <h3 class="text-sm font-bold mt-1">${cols[8] || 'Location Unavailable'}</h3>
                            <p class="text-xs text-gray-500 mt-2">${cols[9] || 'No description provided.'}</p>
                            <div class="border-t mt-4 pt-4 text-xs font-bold">
                                ${cols[5]} Beds | ${cols[6]} Baths | ${cols[7]} sqft
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                console.error("Data error:", e);
            }
        }
        window.addEventListener('DOMContentLoaded', buildAssetDatabase);
    </script>
</body>
</html>
