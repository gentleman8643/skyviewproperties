<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyview Properties | Nationwide Portfolios</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        @keyframes pulse-gentle { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .animate-pulse-gentle { animation: pulse-gentle 3s infinite ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <main class="py-12 max-w-7xl mx-auto px-4">
        <div id="master-catalog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        async function buildAssetDatabase() {
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5Dudb7PfN8IwcrGz8GuKIpPtWymiJNG4bmoCcLiq-z_x2hDmuF3psbI6rDAhMpe0RCopMfdHUuyb1/pub?output=csv';
            
            try {
                const response = await fetch(csvUrl);
                const text = await response.text();
                // Split lines but keep content intact
                const rows = text.split('\n').slice(1).filter(r => r.trim() !== '');
                
                const grid = document.getElementById('master-catalog-grid');
                grid.innerHTML = rows.map(row => {
                    // Use a regex to handle commas inside quoted strings if necessary, 
                    // or simple split if your data is clean
                    const c = row.split(',');
                    
                    // Column index mapping based on your requirements:
                    // 0:ID, 1:Status, 2:Tier, 3:PriceRaw, 4:PriceDisplay, 5:Beds, 6:Baths, 7:SqFt, 8:Address, 9:Description
                    const status = c[1] || 'N/A';
                    const tier = c[2] || 'Standard';
                    const price = c[4] || '$0';
                    const addr = c[8] || 'Address Unavailable';
                    const desc = c[9] || 'No description provided';
                    const beds = c[5] || '0';
                    const baths = c[6] || '0';
                    const sqft = c[7] || '0';

                    return `
                    <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-200 p-6">
                        <span class="bg-indigo-600 text-white text-[10px] font-bold px-2 py-1 rounded-full uppercase">${status}</span>
                        <div class="text-indigo-600 font-extrabold text-2xl mt-3">${price}</div>
                        <h3 class="text-sm font-bold mt-1 text-gray-950">${addr}</h3>
                        <p class="text-xs text-gray-500 mt-2 line-clamp-2">${desc}</p>
                        <div class="border-t mt-4 pt-4 text-xs font-bold text-gray-600 flex justify-between">
                            <span>${beds} Beds</span> <span>${baths} Baths</span> <span>${sqft} SqFt</span>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                console.error("Data error:", e);
            }
        }
        window.addEventListener('DOMContentLoaded', buildAssetDatabase);
    </script>
</body>
</html>
