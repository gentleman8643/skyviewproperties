<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyview Properties | Nationwide Portfolios</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen flex flex-col">

    <main id="catalog-section" class="py-12 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex-grow">
        <div id="master-catalog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="details-modal" class="fixed inset-0 bg-slate-950/60 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl max-w-4xl w-full max-h-[90vh] overflow-y-auto shadow-2xl relative">
            <div class="p-6 space-y-6">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="modal-title" class="text-2xl font-extrabold text-gray-950"></h2>
                        <p id="modal-type" class="text-indigo-600 font-bold text-xs uppercase"></p>
                    </div>
                    <div id="modal-price" class="text-3xl font-black text-indigo-600"></div>
                </div>
                </div>
        </div>
    </div>

    <script>
        let masterDatabase = [];
        let filteredSelection = [];
        let currentPage = 1;
        const recordsPerPage = 12; 

        // --- UPDATED RENDERING ENGINE ---
        function renderCatalogGrid() {
            const grid = document.getElementById('master-catalog-grid');
            grid.innerHTML = "";
            const slice = filteredSelection.slice((currentPage - 1) * recordsPerPage, currentPage * recordsPerPage);

            slice.forEach(house => {
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-xs">
                        <img src="${house.front}" class="w-full h-56 object-cover">
                        <div class="p-6">
                            <div class="text-indigo-600 font-extrabold text-2xl mb-2">${house.priceDisplay}</div>
                            <h3 class="font-bold text-gray-950 truncate">${house.title}</h3>
                            <div class="grid grid-cols-3 gap-2 mt-4 text-xs font-medium text-gray-600 border-t pt-4">
                                <div>${house.beds} Beds</div>
                                <div>${house.baths} Baths</div>
                                <div>${house.sqft.toLocaleString()} sqft</div>
                            </div>
                            <button onclick="openModal('${house.id}')" class="w-full mt-4 bg-slate-900 text-white py-2.5 rounded-xl text-xs font-bold uppercase">Inspect</button>
                        </div>
                    </div>
                `;
            });
        }

        // --- UPDATED MODAL LOGIC FOR COMMERCIAL ---
        function openModal(id) {
            const house = masterDatabase.find(item => item.id === id);
            document.getElementById('modal-title').innerText = house.title;
            document.getElementById('modal-price').innerText = house.priceDisplay; // No extra quotes
            
            // Map the Commercial Tier
            let typeLabel = "Residential Unit";
            if(house.tier === 'luxury') typeLabel = "Premium Estate";
            if(house.tier === 'commercial') typeLabel = "Commercial Facility";
            document.getElementById('modal-type').innerText = typeLabel;
            
            document.getElementById('details-modal').classList.remove('hidden');
        }

        // Add your existing buildAssetDatabase() logic below...
    </script>
</body>
</html>
