<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyview Properties | Premium Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <nav class="bg-white shadow-xs sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-building-user text-indigo-600 text-2xl"></i>
                    <span class="text-xl font-bold tracking-tight text-gray-950">SKYVIEW <span class="text-indigo-600">PROPERTIES</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="global-counter" class="bg-indigo-600 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-xs">Loading Catalog...</span>
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-slate-900 text-white py-12 text-center relative overflow-hidden">
        <div class="absolute inset-0 opacity-20">
            <img src="https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=1920&q=80" class="w-full h-full object-cover" alt="Banner background">
        </div>
        <div class="relative max-w-3xl mx-auto px-4">
            <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight mb-2">Infinite Luxury Real Estate Catalog</h1>
            <p class="text-indigo-200 text-sm sm:text-base">Browse through our entire live collection of premium residential estates, high-rises, and modern architectural spaces.</p>
        </div>
    </header>

    <main class="py-12 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div id="master-catalog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="bg-slate-900 text-gray-400 py-8 text-center text-sm border-t border-slate-800">
        <p>&copy; 2026 SKYVIEW PROPERTIES. All rights reserved.</p>
    </footer>

    <script>
        // Array of professional real estate architectural images to cycle through
        const luxuryImages = [
            "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1600566753376-12c8ab7fb75b?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1568605114967-8130f3a36994?auto=format&fit=crop&w=600&q=80"
        ];

        // Core compilation building function
        function generateMassiveCatalog(totalHousesNeeded) {
            const grid = document.getElementById('master-catalog-grid');
            const counter = document.getElementById('global-counter');
            
            let htmlBuffer = ""; // Hold elements in memory for faster processing layout rendering

            for (let i = 1; i <= totalHousesNeeded; i++) {
                // Alternates half of the database as sale, half as rent
                const isForSale = i % 2 === 0; 
                const tagText = isForSale ? "FOR SALE" : "FOR RENT";
                const tagColor = isForSale ? "bg-indigo-600" : "bg-emerald-600";

                // Mathematical formulas creating dynamic ranges for layout realism
                const randomPrice = isForSale 
                    ? Math.floor(450000 + (i * 4850)) 
                    : Math.floor(1800 + (i * 12));
                    
                const priceString = isForSale 
                    ? `$${randomPrice.toLocaleString()}` 
                    : `$${randomPrice.toLocaleString()} / mo`;

                const beds = (i % 4) + 2; // Cycle bedrooms dynamically between 2 and 5
                const baths = (i % 3) + 1.5; // Cycle bathrooms dynamically between 1.5 and 3.5
                const dimensionsSqft = Math.floor(1100 + (i * 15)); // Build scaled dimensions

                // Smoothly cycle through the image bank array cleanly
                const selectedImage = luxuryImages[i % luxuryImages.length];

                // Append the complete high-fidelity card component markup structural logic
                htmlBuffer += `
                    <div class="bg-white rounded-2xl overflow-hidden shadow-xs border border-gray-200 hover:shadow-md transition duration-300">
                        <div class="relative h-60 bg-gray-100">
                            <img src="${selectedImage}" alt="Skyview Premium Property Listing" class="w-full h-full object-cover">
                            <span class="absolute top-4 left-4 ${tagColor} text-white text-xs font-bold px-3 py-1 rounded-full tracking-wider shadow-xs">${tagText}</span>
                            <span class="absolute bottom-4 right-4 bg-slate-900/80 backdrop-blur-xs text-white text-xs px-2.5 py-1 rounded-md font-medium">ID #SK-${2000 + i}</span>
                        </div>
                        <div class="p-6">
                            <div class="text-indigo-600 font-extrabold text-2xl mb-2">${priceString}</div>
                            <h3 class="text-lg font-bold text-gray-950 mb-1 truncate">Skyview Elite Asset Residence</h3>
                            <p class="text-gray-400 text-xs font-semibold uppercase tracking-wider mb-4">Premium Location Grid Tier</p>
                            
                            <div class="grid grid-cols-3 gap-2 text-center text-xs text-gray-600 border-t border-gray-100 pt-4 font-medium">
                                <div class="bg-gray-50 py-2 rounded-xl">
                                    <i class="fa-solid fa-bed text-indigo-600 mb-1 block text-sm"></i>
                                    <span>${beds} Beds</span>
                                </div>
                                <div class="bg-gray-50 py-2 rounded-xl">
                                    <i class="fa-solid fa-bath text-indigo-600 mb-1 block text-sm"></i>
                                    <span>${baths} Baths</span>
                                </div>
                                <div class="bg-gray-50 py-2 rounded-xl">
                                    <i class="fa-solid fa-ruler-combined text-indigo-600 mb-1 block text-sm"></i>
                                    <span>${dimensionsSqft} sqft</span>
                                </div>
                            </div>
                            
                            <div class="mt-5 pt-1">
                                <button type="button" class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-semibold text-sm py-2.5 rounded-xl transition duration-200 shadow-xs cursor-pointer">
                                    Inquire Details
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            // Draw all compiled elements instantly to the browser window DOM layout
            grid.innerHTML = htmlBuffer;
            counter.innerText = `Total Catalog Portfolio: ${totalHousesNeeded} Properties`;
        }

        // Initialize and fire execution pipeline to build 320 houses automatically on load
        window.addEventListener('DOMContentLoaded', () => {
            generateMassiveCatalog(320);
        });
    </script>
</body>
</html>
